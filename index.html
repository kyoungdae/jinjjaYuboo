<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>"진짜" 유부 갤러리</title>
  <style>
    :root {
      --bg: #0d1018;
      --panel: rgba(23, 28, 42, .96);
      --panel2: rgba(21, 26, 38, .96);
      --line: rgba(255, 255, 255, .10);
      --text: #eef2ff;
      --muted: #aab3cf;
      --accent: #7f8cff;
      --danger: #ff6889;
      --shadow: 0 20px 50px rgba(0, 0, 0, .34);
      --radius: 22px;
      --best-color: #4ade80;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(127, 140, 255, .18), transparent 25%),
        radial-gradient(circle at top right, rgba(103, 212, 193, .12), transparent 20%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1240px; margin: 0 auto; padding: 22px 16px 40px; }
    
    .banner {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 30px;
      min-height: 270px;
      box-shadow: var(--shadow);
      background:
        linear-gradient(90deg, rgba(8,10,16,.95) 0%, rgba(8,10,16,.75) 55%, rgba(8,10,16,.25) 100%),
        url("https://upload.wikimedia.org/wikipedia/commons/e/e0/Dishwasher_with_dishes.JPG") center/cover no-repeat;
      display: flex;
      align-items: flex-end;
      padding: 26px;
      margin-bottom: 18px;
    }
    .banner h1 {
      margin: 0 0 12px 0;
      font-size: clamp(32px, 5vw, 54px);
      letter-spacing: -.04em;
      line-height: 1.02;
      font-weight: 400;
    }
    .banner h1 strong { font-weight: 900; }
    .banner p {
      margin: 0;
      max-width: 820px;
      color: #eef2ff;
      opacity: .95;
      line-height: 1.72;
      font-size: 16px;
      word-break: keep-all;
    }
    
    .grid { display: grid; grid-template-columns: .92fr 1.08fr; gap: 18px; align-items: start; }
    .card {
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .card h2 { margin: 0 0 14px 0; font-size: 20px; letter-spacing: -.02em; }
    label { display: block; margin: 0 0 6px; color: var(--muted); font-size: 13px; }
    input, textarea {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(10, 13, 23, .78);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      outline: none;
      transition: .2s ease;
    }
    textarea { min-height: 160px; resize: vertical; line-height: 1.65; }
    input:focus, textarea:focus {
      border-color: rgba(127, 140, 255, .85);
      box-shadow: 0 0 0 4px rgba(127, 140, 255, .14);
    }
    .row { display: grid; gap: 12px; }
    .btns { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    button {
      border: none; border-radius: 14px; padding: 11px 15px;
      font-weight: 700; cursor: pointer; color: white;
      transition: transform .08s ease, opacity .15s ease, background .2s ease;
    }
    button:active { transform: translateY(1px); }
    .primary { background: linear-gradient(135deg, var(--accent), #6376ff); }
    .secondary { background: rgba(255, 255, 255, .10); }
    .danger { background: linear-gradient(135deg, #ff6889, #ff4e70); }
    .ghost { background: transparent; border: 1px solid rgba(255, 255, 255, .13); color: var(--text); }
    .muted { color: var(--muted); }
    
    .tools { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 14px; }
    .post-list { display: grid; gap: 14px; }
    .post {
      background: linear-gradient(180deg, rgba(27, 33, 49, .95), rgba(20, 24, 36, .95));
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      position: relative;
    }
    
    .best-post {
      border: 2px solid var(--best-color);
      box-shadow: 0 0 25px rgba(74, 222, 128, 0.15);
      background: linear-gradient(180deg, rgba(30, 45, 40, .95), rgba(20, 24, 36, .95));
    }
    .best-post.collapsed {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      transition: background 0.2s ease;
    }
    .best-post.collapsed:hover { background: linear-gradient(180deg, rgba(40, 55, 50, .95), rgba(25, 29, 41, .95)); }
    .best-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--best-color);
      color: #0d1018;
      padding: 6px 12px;
      border-radius: 10px;
      font-weight: 900;
      font-size: 14px;
      margin-bottom: 14px;
    }
    .pagination {
      display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; margin-top: 10px;
    }
    .page-btn {
      padding: 8px 14px; border-radius: 10px; background: rgba(255, 255, 255, .05); border: 1px solid rgba(255, 255, 255, .1); color: var(--text); cursor: pointer; font-size: 14px;
    }
    .page-btn.active {
      background: var(--accent); color: white; border-color: var(--accent);
    }

    .post-head {
      display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 10px;
    }
    .post-title { margin: 0; font-size: 19px; letter-spacing: -.02em; }
    .post-meta { margin-top: 4px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .tag {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 54px; padding: 7px 10px; border-radius: 999px;
      background: rgba(103, 212, 193, .12); border: 1px solid rgba(103, 212, 193, .22);
      color: #d9fff6; font-size: 12px;
    }
    .post-body { white-space: pre-wrap; line-height: 1.78; margin: 0 0 14px 0; color: #edf1ff; }
    
    .reaction-bar { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 10px; }
    .reaction {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(255, 255, 255, .06);
      color: var(--text); border-radius: 999px; padding: 7px 10px; cursor: pointer; font-weight: 700;
    }
    .reaction.active { background: rgba(127, 140, 255, .18); border-color: rgba(127, 140, 255, .42); }
    .reaction span.count { color: var(--muted); font-weight: 700; }
    
    .comments { margin-top: 10px; border-top: 1px solid rgba(255, 255, 255, .08); padding-top: 12px; }
    .comments h3 { margin: 0; font-size: 15px; }
    .comment-list { display: grid; gap: 8px; margin-bottom: 12px; }
    .comment {
      padding: 10px 12px; border-radius: 14px; background: rgba(255, 255, 255, .05); border: 1px solid rgba(255, 255, 255, .08);
    }
    .comment-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 4px; }
    .comment-info { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .comment-name { font-weight: 800; font-size: 14px; }
    .comment-time { color: var(--muted); font-size: 12px; }
    .comment-actions button { padding: 4px 8px; font-size: 11px; border-radius: 8px; margin-left: 4px; }
    .comment-body { white-space: pre-wrap; line-height: 1.6; color: #eef1ff; font-size: 14px; }
    
    .comment-form { display: grid; gap: 8px; }
    .comment-form-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .comment-form input, .comment-form textarea { padding: 10px 12px; border-radius: 12px; font-size: 14px; }
    .comment-form textarea { min-height: 60px; max-height: 120px; }
    
    .edit-box { margin-top: 12px; padding: 12px; border-radius: 18px; background: rgba(255, 255, 255, .05); border: 1px solid rgba(255, 255, 255, .08); }
    .edit-grid { display: grid; gap: 10px; }
    .empty { border: 1px dashed rgba(255, 255, 255, .16); border-radius: 18px; padding: 26px; text-align: center; color: var(--muted); line-height: 1.65; }

    @media (max-width: 940px) {
      .grid { grid-template-columns: 1fr; }
      .post-head { flex-direction: column; }
      .banner { min-height: 260px; padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="banner" aria-label="배너">
      <div>
        <h1><strong>"진짜"</strong> 유부 갤러리</h1>
        <p>퇴근의 기쁨도 잠시, 문을 여는 순간 두 번째 출근이 시작된다. 산처럼 쌓인 설거지와 장바구니, 끝없는 집안일의 굴레 속에서 내 시간은 언제나 맨 마지막으로 밀려나는 유부남들의 서글픈 안식처.</p>
      </div>
    </section>

    <div class="grid">
      <section class="card">
        <h2>게시글 작성</h2>
        <div class="row">
          <div>
            <label for="authorInput">닉네임</label>
            <input id="authorInput" type="text" maxlength="30" placeholder="비워두면 자동 생성" />
          </div>
          <div>
            <label for="postPasswordInput">개인 암호(4자리 숫자)</label>
            <input id="postPasswordInput" type="password" placeholder="예: 1234" inputmode="numeric" autocomplete="off" maxlength="4" />
          </div>
          <div>
            <label for="titleInput">제목</label>
            <input id="titleInput" type="text" maxlength="120" placeholder="제목을 입력" />
          </div>
          <div>
            <label for="contentInput">내용</label>
            <textarea id="contentInput" placeholder="게시글 내용을 입력"></textarea>
          </div>
        </div>
        <div class="btns">
          <button id="publishBtn" class="primary">등록</button>
          <button id="clearFormBtn" class="secondary">초기화</button>
        </div>
      </section>

      <section class="card">
        <h2>게시글 목록</h2>
        <div class="tools">
          <input id="searchInput" type="text" placeholder="검색: 제목, 본문, 작성자" />
        </div>
        <div id="postList" class="post-list">
          <div class="empty">게시글을 불러오는 중...</div>
        </div>
      </section>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { 
    getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, collectionGroup, arrayUnion, arrayRemove 
  } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCJJ9VFYoYxBOfFtgtF59SefDYVw6OR60Y",
    authDomain: "jjinyuboo.firebaseapp.com",
    projectId: "jjinyuboo",
    storageBucket: "jjinyuboo.firebasestorage.app",
    messagingSenderId: "160545555943",
    appId: "1:160545555943:web:c3bfdad8b9c5da7ccbe942",
    measurementId: "G-XL2PGKT87T"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const ADMIN_PASSWORD = "thomas0617";
  const REACTIONS = ["👍", "🤣", "🛢️", "🤬", "🧜🏾‍♀️"];
  const ADJECTIVES = ["비운의", "행복한", "따듯한", "통 속의", "야근하는", "간장이 안 짠", "설거지하는", "눈물이 앞을 가리는", "흘리는", "기가 죽은", "담 걸린", "청소하는","등짝 맞는", "배고픈", "소파를 뺏긴", "분리수거하는", "육아 중인", "거실에 누운", "아빠가 된", "용돈 받는","비자금 들킨", "눈치보는", "찬밥을 먹는", "레고 밟는", "형광등 가는", "심부름가는"];
  const NOUNS = ["근육맨", "주무관", "남편", "유부남", "위고버", "훌리건", "가자지", "안드로진", "튜브 오너", "비혼주의자", "가장", "돌쇠", "집사", "백수희망자", "날스괴 신도", "생존자", "낙하산", "세탁술사", "현금인출기", "청소마스터", "반찬평론가", "가계부감독", "리얼충", "기사님", "대리기사", "왕용사"];

  const $ = (id) => document.getElementById(id);
  const authorInput = $("authorInput");
  const postPasswordInput = $("postPasswordInput");
  const titleInput = $("titleInput");
  const contentInput = $("contentInput");
  const searchInput = $("searchInput");
  const postList = $("postList");

  let clientId = sessionStorage.getItem("jubu_clientId");
  if (!clientId) {
    clientId = Math.random().toString(36).substring(2, 15);
    sessionStorage.setItem("jubu_clientId", clientId);
  }

  let postsData = [];
  let commentsData = [];
  let editingPosts = {};
  let editingComments = {};
  
  const POSTS_PER_PAGE = 5;
  let currentPage = 1;
  let isBestPostExpanded = false;
  let openCommentForms = {};

  function fmt(ts) {
    return new Date(ts).toLocaleString("ko-KR", {
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit"
    });
  }

  function escapeHtml(str) {
    return String(str || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function randomNick() {
    const adj = ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)];
    const noun = NOUNS[Math.floor(Math.random() * NOUNS.length)];
    const num = String(Math.floor(Math.random() * 100)).padStart(2, "0");
    return `${adj} ${noun}${num}`;
  }

  function validatePassword(pw) {
    return /^[0-9]{4}$/.test(pw);
  }

  function getReactionTotal(post) {
    if (!post.reactions) return 0;
    return Object.values(post.reactions).reduce((acc, users) => acc + (users ? users.length : 0), 0);
  }

  // ★ 변경된 부분 1: 한국 시간 기준(KST) 오늘 받은 반응 수만 골라내어 계산하는 함수 추가 ★
  function getTodayReactionCount(post) {
    if (!post.reactions) return 0;
    let count = 0;
    // KST(UTC+9) 기준 현재 날짜 문자열(YYYY-MM-DD) 생성
    const nowStr = new Date(Date.now() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
    
    Object.values(post.reactions).forEach(users => {
      if (Array.isArray(users)) {
        users.forEach(u => {
          // 타임스탬프 정보가 포함된 객체 형태일 경우에만 오늘 날짜인지 비교
          if (u && typeof u === 'object' && u.at) {
            const targetStr = new Date(u.at + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
            if (targetStr === nowStr) {
              count++;
            }
          }
        });
      }
    });
    return count;
  }

  onSnapshot(collection(db, "posts"), (snapshot) => {
    postsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    render();
  }, (err) => console.error("게시글 로드 오류:", err));

  onSnapshot(collectionGroup(db, "comments"), (snapshot) => {
    commentsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    render();
  }, (err) => console.error("댓글 로드 오류:", err));

  $("publishBtn").addEventListener("click", async () => {
    const pw = postPasswordInput.value;
    const title = titleInput.value.trim();
    const content = contentInput.value.trim();
    const nickname = authorInput.value.trim() || randomNick();

    if (!validatePassword(pw)) {
      alert("개인 암호는 4자리 숫자여야 합니다.");
      return;
    }
    if (!title || !content) {
      alert("제목과 내용을 모두 입력해 주세요.");
      return;
    }

    try {
      $("publishBtn").disabled = true;
      $("publishBtn").textContent = "등록 중...";
      
      const initReactions = {};
      REACTIONS.forEach(r => initReactions[r] = []);

      await addDoc(collection(db, "posts"), {
        title, content, nickname, password: pw,
        createdAt: Date.now(), updatedAt: Date.now(),
        reactions: initReactions
      });

      authorInput.value = ""; postPasswordInput.value = "";
      titleInput.value = ""; contentInput.value = "";
      currentPage = 1;
    } catch (e) {
      console.error(e);
      alert("게시글 등록에 실패했습니다.");
    } finally {
      $("publishBtn").disabled = false;
      $("publishBtn").textContent = "등록";
    }
  });

  $("clearFormBtn").addEventListener("click", () => {
    authorInput.value = ""; postPasswordInput.value = "";
    titleInput.value = ""; contentInput.value = "";
  });

  searchInput.addEventListener("input", () => {
    currentPage = 1;
    render();
  });

  function render() {
    const q = searchInput.value.trim().toLowerCase();
    
    // ★ 변경된 부분 2: 검색 필터링 매핑 시 '오늘 반응 점수'와 '전체 반응 점수'를 동시에 부여 ★
    const filtered = postsData
      .filter(p => `${p.nickname} ${p.title} ${p.content}`.toLowerCase().includes(q))
      .map(p => ({ 
        ...p, 
        _totalScore: getReactionTotal(p),
        _todayScore: getTodayReactionCount(p)
      }));

    if (filtered.length === 0) {
      postList.innerHTML = `
        <div class="empty">
          표시할 게시글이 없습니다.<br/>
          ${q ? "검색어에 맞는 게시글이 없습니다." : "첫 게시글을 등록해 보세요."}
        </div>`;
      return;
    }

    // ★ 변경된 부분 3: 인기글 산출 조건 교체 ★
    // 1순위: 오늘 반응 수 많은 순 정렬 -> 2순위: 동률일 때 전체 반응 수 많은 순 정렬
    const sortedForBest = [...filtered].sort((a, b) => {
      if (b._todayScore !== a._todayScore) return b._todayScore - a._todayScore;
      if (b._totalScore !== a._totalScore) return b._totalScore - a._totalScore;
      return b.createdAt - a.createdAt;
    });

    let bestPost = null;
    let otherPosts = [];

    // 오늘 반응 수나 전체 반응 수가 1개 이상이라도 존재할 때 인기글 선정 활성화
    if (sortedForBest.length > 0 && (sortedForBest[0]._todayScore > 0 || sortedForBest[0]._totalScore > 0) && q === "") {
      bestPost = sortedForBest[0];
      otherPosts = sortedForBest.slice(1).sort((a, b) => b.createdAt - a.createdAt);
    } else {
      otherPosts = sortedForBest.sort((a, b) => b.createdAt - a.createdAt);
    }

    const totalPages = Math.ceil(otherPosts.length / POSTS_PER_PAGE);
    const paginatedPosts = otherPosts.slice((currentPage - 1) * POSTS_PER_PAGE, currentPage * POSTS_PER_PAGE);

    let html = "";
    if (bestPost) html += generatePostHTML(bestPost, true);
    
    html += paginatedPosts.map(p => generatePostHTML(p, false)).join("");
    
    if (totalPages > 1) {
      html += `<div class="pagination">`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
      }
      html += `</div>`;
    }
    
    postList.innerHTML = html;
  }

  function generatePostHTML(post, isBest) {
    if (isBest && !isBestPostExpanded) {
      return `
        <article class="post best-post collapsed" data-best-toggle="true">
          <div style="display: flex; align-items: center; gap: 10px;">
            <div class="best-badge" style="margin: 0;">🏆</div>
            <h3 style="margin: 0; font-size: 16px; color: var(--best-color);">${escapeHtml(post.title)} - 🤩인기글 보기🤩</h3>
          </div>
        </article>
      `;
    }

    const postComments = commentsData
      .filter(c => c.postId === post.id)
      .sort((a, b) => a.createdAt - b.createdAt);

    // ★ 변경된 부분 4: 이전 방식(문자열 배열)과 타임스탬프 방식(객체 배열) 데이터 모두 활성화 상태가 조회되도록 호환 처리 ★
    const reactionsHtml = REACTIONS.map(r => {
      const users = post.reactions?.[r] || [];
      const isActive = users.some(u => (typeof u === 'object' ? u.uid === clientId : u === clientId));
      return `
        <button class="reaction ${isActive ? "active" : ""}" data-react="${post.id}:${r}">
          ${r} <span class="count">${users.length}</span>
        </button>
      `;
    }).join("");

    const commentsHtml = postComments.map(c => {
      if (editingComments[c.id]) {
        return `
          <div class="comment">
            <div class="edit-grid">
              <textarea id="edit-comment-content-${c.id}">${escapeHtml(c.content)}</textarea>
              <div class="btns" style="justify-content: flex-end;">
                <button class="primary" data-comment-save="${post.id}:${c.id}">저장</button>
                <button class="secondary" data-comment-cancel="${c.id}">취소</button>
              </div>
            </div>
          </div>
        `;
      }
      return `
        <div class="comment">
          <div class="comment-top">
            <div class="comment-info">
              <span class="comment-name">${escapeHtml(c.nickname)}</span>
              <span class="comment-time">${fmt(c.createdAt)}</span>
            </div>
            <div class="comment-actions">
              <button data-comment-edit="${post.id}:${c.id}" class="ghost">수정</button>
              <button data-comment-delete="${post.id}:${c.id}" class="ghost danger">삭제</button>
            </div>
          </div>
          <div class="comment-body">${escapeHtml(c.content)}</div>
        </div>
      `;
    }).join("");

    const editBox = editingPosts[post.id] ? `
      <div class="edit-box">
        <div class="edit-grid">
          <div>
            <label>수정 제목</label>
            <input id="edit-title-${post.id}" type="text" maxlength="120" value="${escapeHtml(post.title)}" />
          </div>
          <div>
            <label>수정 내용</label>
            <textarea id="edit-content-${post.id}">${escapeHtml(post.content)}</textarea>
          </div>
          <div class="btns">
            <button class="primary" data-edit-save="${post.id}">저장</button>
            <button class="secondary" data-edit-cancel="${post.id}">취소</button>
          </div>
        </div>
      </div>
    ` : "";

    const showCommentForm = openCommentForms[post.id];

    return `
      <article class="post ${isBest ? 'best-post' : ''}">
        ${isBest ? `
          <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div class="best-badge">🏆 오늘의 유부</div>
            <button class="ghost" data-best-toggle="true" style="padding:4px 8px; font-size:12px;">접기 ⬆️</button>
          </div>
        ` : ''}
        <div class="post-head">
          <div>
            <h3 class="post-title">${escapeHtml(post.title)}</h3>
            <div class="post-meta">
              작성자: <strong>${escapeHtml(post.nickname)}</strong><br/>
              작성: ${fmt(post.createdAt)}${post.updatedAt !== post.createdAt ? ` · 수정: ${fmt(post.updatedAt)}` : ""}
            </div>
          </div>
          <span class="tag">#${post.id.slice(-6).toUpperCase()}</span>
        </div>

        <div class="post-body">${escapeHtml(post.content)}</div>

        <div class="reaction-bar">${reactionsHtml}</div>

        <div class="btns">
          <button class="secondary" data-edit="${post.id}">수정</button>
          <button class="danger" data-delete="${post.id}">삭제</button>
        </div>

        ${editBox}

        <section class="comments">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3>댓글</h3>
            <button class="ghost" data-comment-toggle="${post.id}" style="padding: 4px 10px; font-size: 13px;">💬 댓글 작성</button>
          </div>
          <div class="comment-list">
            ${commentsHtml || `<div class="muted" style="font-size:13px;">작성된 댓글이 없습니다.</div>`}
          </div>
          <div class="comment-form" style="display: ${showCommentForm ? 'grid' : 'none'};">
            <div class="comment-form-inputs">
              <input id="comment-name-${post.id}" type="text" maxlength="24" placeholder="닉네임(자동생성)" />
              <input id="comment-pw-${post.id}" type="password" maxlength="4" placeholder="암호(숫자 4자리)" inputmode="numeric" />
            </div>
            <textarea id="comment-content-${post.id}" placeholder="댓글을 남겨보세요."></textarea>
            <div style="text-align: right;">
              <button class="primary" data-comment-add="${post.id}">댓글 등록</button>
            </div>
          </div>
        </section>
      </article>
    `;
  }

  postList.addEventListener("click", async (e) => {
    const bestToggle = e.target.closest("[data-best-toggle]");
    if (bestToggle) {
      isBestPostExpanded = !isBestPostExpanded;
      render();
      return;
    }

    const target = e.target.closest("button");
    if (!target) return;

    if (target.dataset.page) {
      currentPage = Number(target.dataset.page);
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }

    if (target.dataset.commentToggle) {
      const postId = target.dataset.commentToggle;
      openCommentForms[postId] = !openCommentForms[postId];
      render();
      return;
    }

    // ★ 변경된 부분 5: 반응 이모지 클릭 시 타임스탬프(`at`)를 포함한 객체 정보로 Firebase 저장 구조 업그레이드 ★
    if (target.dataset.react) {
      const [postId, emoji] = target.dataset.react.split(":");
      const postRef = doc(db, "posts", postId);
      const post = postsData.find(p => p.id === postId);
      if(!post) return;
      
      const users = post.reactions?.[emoji] || [];
      const existingReaction = users.find(u => (typeof u === 'object' ? u.uid === clientId : u === clientId));
      const updateField = `reactions.${emoji}`;
      
      try {
        if (existingReaction) {
          await updateDoc(postRef, { [updateField]: arrayRemove(existingReaction) });
        } else {
          await updateDoc(postRef, { [updateField]: arrayUnion({ uid: clientId, at: Date.now() }) });
        }
      } catch (err) {
        console.error("반응 처리 오류:", err);
      }
    }

    else if (target.dataset.edit) {
      const postId = target.dataset.edit;
      const post = postsData.find(p => p.id === postId);
      const input = prompt("작성 시 입력한 암호를 입력하세요.");
      if (input === null) return;
      if (input !== post.password) {
        alert("암호가 일치하지 않습니다.");
        return;
      }
      editingPosts[postId] = true;
      render();
    }
    else if (target.dataset.editCancel) {
      delete editingPosts[target.dataset.editCancel];
      render();
    }
    else if (target.dataset.editSave) {
      const postId = target.dataset.editSave;
      const newTitle = $(`edit-title-${postId}`).value.trim();
      const newContent = $(`edit-content-${postId}`).value.trim();
      if (!newTitle || !newContent) {
        alert("제목과 내용을 입력해 주세요.");
        return;
      }
      try {
        target.disabled = true;
        await updateDoc(doc(db, "posts", postId), {
          title: newTitle, content: newContent, updatedAt: Date.now()
        });
        delete editingPosts[postId];
      } catch (err) {
        console.error(err);
        alert("수정 실패!");
        target.disabled = false;
      }
    }

    else if (target.dataset.delete) {
      const postId = target.dataset.delete;
      const post = postsData.find(p => p.id === postId);
      const input = prompt("암호를 입력하세요, 휴먼.");
      if (input === null) return;
      if (input !== post.password && input !== ADMIN_PASSWORD) {
        alert("암호가 일치하지 않습니다.");
        return;
      }
      if (!confirm("정말 이 게시글을 삭제하시겠습니까?")) return;
      
      try {
        await deleteDoc(doc(db, "posts", postId));
      } catch (err) {
        console.error("삭제 오류:", err);
      }
    }

    else if (target.dataset.commentAdd) {
      const postId = target.dataset.commentAdd;
      const nickname = $(`comment-name-${postId}`).value.trim() || randomNick();
      const pw = $(`comment-pw-${postId}`).value;
      const content = $(`comment-content-${postId}`).value.trim();

      if (!validatePassword(pw)) {
        alert("댓글 암호는 4자리 숫자여야 합니다.");
        return;
      }
      if (!content) {
        alert("댓글 내용을 입력해 주세요.");
        return;
      }

      try {
        target.disabled = true;
        await addDoc(collection(db, "posts", postId, "comments"), {
          postId, nickname, password: pw, content, createdAt: Date.now()
        });
        $(`comment-name-${postId}`).value = "";
        $(`comment-pw-${postId}`).value = "";
        $(`comment-content-${postId}`).value = "";
        openCommentForms[postId] = false;
      } catch (err) {
        console.error("댓글 등록 오류:", err);
        alert("등록 실패!");
      } finally {
        target.disabled = false;
      }
    }

    else if (target.dataset.commentEdit) {
      const [postId, commentId] = target.dataset.commentEdit.split(":");
      const comment = commentsData.find(c => c.id === commentId);
      const input = prompt("작성 시 입력한 4자리 암호를 입력하세요.");
      if (input === null) return;
      if (input !== comment.password) {
        alert("암호가 일치하지 않습니다.");
        return;
      }
      editingComments[commentId] = true;
      render();
    }
    else if (target.dataset.commentCancel) {
      delete editingComments[target.dataset.commentCancel];
      render();
    }
    else if (target.dataset.commentSave) {
      const [postId, commentId] = target.dataset.commentSave.split(":");
      const newContent = $(`edit-comment-content-${commentId}`).value.trim();
      if (!newContent) {
        alert("내용을 입력해 주세요.");
        return;
      }
      try {
        await updateDoc(doc(db, "posts", postId, "comments", commentId), {
          content: newContent
        });
        delete editingComments[commentId];
      } catch (err) {
        console.error("댓글 수정 오류:", err);
      }
    }

    else if (target.dataset.commentDelete) {
      const [postId, commentId] = target.dataset.commentDelete.split(":");
      const comment = commentsData.find(c => c.id === commentId);
      const input = prompt("암호를 입력하세요, 휴먼.");
      if (input === null) return;
      if (input !== comment.password && input !== ADMIN_PASSWORD) {
        alert("암호가 일치하지 않습니다.");
        return;
      }
      if (!confirm("댓글을 삭제하시겠습니까?")) return;
      
      try {
        await deleteDoc(doc(db, "posts", postId, "comments", commentId));
      } catch (err) {
        console.error("댓글 삭제 오류:", err);
      }
    }
  });
</script>
</body>
</html>
